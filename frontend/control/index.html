<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AIS-catcher</title>
    <link rel="stylesheet" href="css/tailwind.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: #18181b;
            touch-action: pan-x pan-y;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
            color-scheme: dark;
        }

        #hub-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        #webviewer-frame {
            position: absolute;
            top: 0;
            left: 0;
            border: none;
            width: 100%;
            height: 100%;
            touch-action: pan-x pan-y;
        }

        #bottom-bar {
            position: relative;
            flex-shrink: 0;
            width: 100%;
            background: #18181b;
            border-top: 1px solid #3f3f46;
            z-index: 50;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .hub-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 0.75rem;
            color: white;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            min-width: 70px;
        }

        .hub-button:hover {
            background: #27272a;
        }

        .hub-button.active {
            background: #27272a;
        }

        .hub-button svg {
            width: 1.5rem;
            height: 1.5rem;
            margin-bottom: 0.25rem;
        }

        /* draws the eye to Start/Restart while saved settings wait to be applied */
        .hub-button.attention {
            background: #9a3412;
        }

        .hub-button.attention:hover {
            background: #7c2d12;
        }

        #system-overlay {
            position: fixed;
            inset: 0;
            background: rgba(24, 24, 27, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 65;
            padding: 1rem;
        }

        #system-overlay.open {
            display: flex;
        }

        #system-modal {
            background: #0c0c0e;
            border: 1px solid #3f3f46;
            border-radius: 1rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 1000px;
            height: 85vh;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #system-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #3f3f46;
            background: #18181b;
            flex-shrink: 0;
        }

        #system-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid #3f3f46;
            background: #18181b;
            flex-shrink: 0;
        }

        .sys-tab {
            padding: 0.4rem 0.95rem;
            border-radius: 0.5rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #a1a1aa;
            cursor: pointer;
            transition: color 0.15s, background-color 0.15s;
        }

        .sys-tab:hover {
            color: #f4f4f5;
            background: #27272a;
        }

        .sys-tab.active {
            background: #3f3f46;
            color: #fafafa;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        #system-body {
            flex: 1;
            min-height: 0;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
        }

        .sys-pane {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sys-pane.hidden {
            display: none;
        }

        .sys-pane[data-pane="log"],
        .sys-pane[data-pane="config"] {
            overflow: hidden;
        }

        @media (max-width: 640px) {
            #system-overlay {
                padding: 0;
            }
            #system-modal {
                max-width: 100%;
                height: 100vh;
                height: 100dvh;
                max-height: none;
                border-radius: 0;
            }
        }

        #login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #login-overlay.open {
            display: flex;
        }

        #config-json {
            background: #18181b;
            color: #d4d4d8;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.75rem;
            line-height: 1.5;
            padding: 0.75rem;
            flex: 1;
            min-height: 0;
            overflow: auto;
            white-space: pre;
            margin: 0;
        }

        #log-box {
            background: #18181b;
            padding: 0.75rem;
            flex: 1;
            min-height: 0;
            overflow: auto;
        }

        .log-line {
            display: flex;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.75rem;
            line-height: 1.5;
            padding: 1px 0;
            white-space: pre;
        }

        .log-line.error {
            color: #f87171;
        }

        .log-line.warning {
            color: #fbbf24;
        }

        .log-line.info {
            color: #60a5fa;
        }

        .log-line.debug {
            color: #a1a1aa;
            opacity: 0.75;
        }

        .log-line.default {
            color: #d4d4d8;
        }

        .log-ts {
            color: #52525b;
            margin-right: 0.5em;
            user-select: none;
            flex-shrink: 0;
        }

        /* bottom bar: buttons centered, status + LEDs + community grouped on
           the right. The empty left spacer shrinks first, so when space gets
           tight the buttons drift left before any indicator collapses. */
        #bar-inner {
            display: flex;
            align-items: center;
            height: 4rem;
            padding: 0 12px;
            gap: 12px;
        }

        #bar-left {
            flex: 1 1 0;
            min-width: 0;
        }

        #bar-right {
            min-width: max-content;
        }

        #status-dot-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            overflow: hidden;
        }

        .bar-divider {
            display: none;
            width: 1px;
            height: 1.75rem;
            background: #3f3f46;
        }

        @media (min-width: 640px) {
            .bar-divider.div-640 {
                display: block;
            }
        }

        @media (min-width: 660px) {
            .bar-divider.div-768 {
                display: block;
            }
        }

        #nav-buttons {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }

        #bar-right {
            flex: 1 1 0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        /* community map link: subordinate icon-only shortcut, first to go
           when space is tight */
        #community-link {
            display: none;
            text-decoration: none;
            color: #a1a1aa;
            transition: color 0.15s;
        }

        #community-link svg {
            width: 20px;
            height: 20px;
        }

        #community-link:hover {
            color: #d4d4d8;
        }

        @media (min-width: 660px) {
            #community-link {
                display: flex;
                align-items: center;
            }
        }

        @media (min-width: 640px) {
            #nav-buttons {
                gap: 3rem;
            }
        }

        @media (max-width: 639px) {
            .hub-button {
                min-width: 54px;
                padding: 0.5rem 0.4rem;
            }
        }

        #channel-leds {
            display: none;
        }

        @media (min-width: 640px) {
            #channel-leds {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-right: 6px;
            }
        }

        .ch-led-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .ch-led {
            width: 7px;
            height: 7px;
            border-radius: 9999px;
            background: #3f3f46;
            transition: background-color 0.5s ease-out;
        }

        .ch-led.flash {
            background: #34d399;
            transition: none;
        }

        .ch-led-label {
            font-size: 8px;
            line-height: 1;
            color: #a1a1aa;
        }

        #wizard-overlay {
            position: fixed;
            inset: 0;
            background: rgba(24, 24, 27, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 90;
            padding: 1rem;
        }

        #wizard-overlay.open {
            display: flex;
        }

        #wizard-card {
            background: #18181b;
            border: 1px solid #3f3f46;
            border-radius: 1rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            max-height: calc(100vh - 2rem);
            max-height: calc(100dvh - 2rem);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .wz-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1rem 0 1.5rem;
        }

        .wz-x {
            border: none;
            background: transparent;
            color: #a1a1aa;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 0.5rem;
        }

        .wz-x:hover {
            color: #f4f4f5;
            background: #27272a;
        }

        .wz-dots {
            display: flex;
            gap: 6px;
        }

        .wz-dot {
            width: 8px;
            height: 8px;
            border-radius: 9999px;
            background: #3f3f46;
        }

        .wz-dot.active {
            background: #0857b1;
        }

        .wz-dot.past {
            background: #93c5fd;
        }

        .wz-body {
            padding: 0.75rem 1.5rem 0.5rem;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }

        .wz-body h2 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #f4f4f5;
            margin: 0.75rem 0 0.15rem;
        }

        .wz-body h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f4f4f5;
            margin: 0 0 0.5rem;
        }

        .wz-body p {
            font-size: 0.875rem;
            color: #d4d4d8;
            line-height: 1.55;
            margin: 0.5rem 0;
        }

        .wz-welcome {
            text-align: center;
            padding-bottom: 0.25rem;
        }

        .wz-welcome p {
            text-align: left;
        }

        .wz-welcome .wz-sub {
            text-align: center;
            font-size: 0.75rem;
            color: #a1a1aa;
            margin-top: 0;
        }

        .wz-logo {
            display: inline-block;
            width: 64px;
            height: 64px;
        }

        .wz-logo svg {
            width: 100%;
            height: 100%;
        }

        .wz-fineprint {
            font-size: 0.72rem !important;
            color: #a1a1aa !important;
        }

        .wz-fineprint a {
            color: #a1a1aa;
            text-decoration: underline;
        }

        .wz-intro {
            margin-top: 0;
        }

        .wz-options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .wz-option {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            border: 1px solid #3f3f46;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }

        .wz-option:hover {
            border-color: #52525b;
            background: #27272a;
        }

        .wz-option.selected {
            border-color: #3b82f6;
            background: rgba(59,130,246,0.15);
        }

        .wz-option input[type="radio"] {
            margin-top: 0.2rem;
            accent-color: #0857b1;
        }

        .wz-option-icon {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            color: #a1a1aa;
        }

        .wz-option.selected .wz-option-icon {
            color: #0857b1;
        }

        .wz-option-icon svg {
            width: 100%;
            height: 100%;
        }

        .wz-mini-link {
            color: #0857b1;
            text-decoration: underline;
        }

        .wz-option-main {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }

        .wz-option-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #f4f4f5;
        }

        .wz-option-sub {
            font-size: 0.75rem;
            color: #a1a1aa;
        }

        .wz-daisy {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .wz-daisy.hidden {
            display: none;
        }

        .wz-daisy input,
        .wz-daisy select,
        .wz-input {
            width: 100%;
            border: 1px solid #52525b;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            color: #f4f4f5;
            background: #0a0a0c;
            box-sizing: border-box;
        }

        .wz-daisy input:focus,
        .wz-input:focus {
            outline: 2px solid #93c5fd;
            border-color: #0857b1;
        }

        .wz-none {
            font-size: 0.8rem !important;
            color: #a1a1aa !important;
        }

        .wz-loading {
            font-size: 0.85rem;
            color: #a1a1aa;
            padding: 0.75rem 0;
        }

        .wz-service {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            margin: 0.5rem 0 0.75rem;
        }

        .wz-service-icon {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
        }

        .wz-service-icon svg,
        .wz-service-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .wz-field-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #d4d4d8;
            margin: 0.9rem 0 0.3rem;
        }

        .wz-summary {
            margin: 0.5rem 0 1rem;
            padding-left: 1.25rem;
            font-size: 0.875rem;
            color: #d4d4d8;
            line-height: 1.9;
        }

        .wz-check {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: #d4d4d8;
            margin: 0.5rem 0;
        }

        .wz-check input {
            accent-color: #0857b1;
        }

        .wz-error {
            margin: 0 1.5rem;
            font-size: 0.8rem;
            color: #fda4af;
            background: rgba(244,63,94,0.12);
            border: 1px solid rgba(244,63,94,0.35);
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
        }

        .wz-error.hidden {
            display: none;
        }

        .wz-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem 1.25rem;
        }

        .wz-foot-right {
            display: flex;
            gap: 0.5rem;
        }

        .wz-btn {
            border-radius: 0.5rem;
            padding: 0.5rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.15s;
        }

        .wz-btn.primary {
            background: #27272a;
            color: #e4e4e7;
            border: 1px solid #52525b;
        }

        .wz-btn.primary:hover {
            background: #3f3f46;
        }

        .wz-btn.primary:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .wz-btn.ghost {
            background: transparent;
            color: #a1a1aa;
            border: 1px solid #52525b;
        }

        .wz-btn.ghost:hover {
            background: #27272a;
        }

        .wz-btn.link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #0857b1;
            color: white;
            text-decoration: none;
            margin: 0.25rem 0;
        }

        .wz-btn.link:hover {
            background: #0a66d0;
        }

        .wz-btn.link svg {
            width: 14px;
            height: 14px;
        }
    </style>
</head>
<body>
    <div id="hub-container">
        <div id="loading" class="text-center p-8 absolute inset-0 flex items-center justify-center">
            <div>
                <svg class="animate-spin h-12 w-12 text-zinc-400 mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-zinc-300">Connecting...</p>
            </div>
        </div>
        <iframe id="webviewer-frame" src="" class="hidden" allow="fullscreen" allowfullscreen
            sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>

        <div id="login-overlay">
            <div class="bg-zinc-800 border border-zinc-700 rounded-2xl shadow-xl p-6 w-full max-w-sm mx-4">
                <h3 id="login-title" class="text-lg font-semibold text-zinc-100 mb-1">Sign In</h3>
                <p id="login-subtitle" class="text-sm text-zinc-400 mb-4">Authentication required to continue.</p>
                <div id="login-error" class="hidden mb-3 text-sm text-rose-300 bg-rose-900/40 border border-rose-800 rounded-lg px-3 py-2"></div>
                <form id="login-form" class="space-y-3">
                    <input id="login-password" name="password" type="password" autocomplete="current-password"
                        placeholder="Password"
                        class="w-full bg-zinc-900 text-zinc-100 placeholder-zinc-500 border border-zinc-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-zinc-500" />
                    <input id="login-password2" name="password2" type="password" autocomplete="new-password"
                        placeholder="Confirm password"
                        class="hidden w-full bg-zinc-900 text-zinc-100 placeholder-zinc-500 border border-zinc-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-zinc-500" />
                    <div class="flex gap-2 pt-1">
                        <button type="button" id="login-cancel"
                            class="flex-1 px-4 py-2 rounded-lg text-sm font-medium border border-zinc-600 text-zinc-300 hover:bg-zinc-700 transition">
                            Cancel
                        </button>
                        <button type="submit" id="login-submit"
                            class="flex-1 px-4 py-2 rounded-lg text-sm font-semibold bg-zinc-100 text-zinc-900 hover:bg-white transition">
                            Sign In
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- The nav bar's Input/Output/System buttons all open this modal and
             jump to the matching tab. -->
        <div id="system-overlay">
            <div id="system-modal">
                <div id="system-header">
                    <h3 id="system-title" class="text-lg font-semibold text-zinc-100">Settings</h3>
                    <button id="system-close" class="text-zinc-400 hover:text-zinc-100 p-1">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <div id="system-tabs">
                    <button class="sys-tab" data-tab="input">Input</button>
                    <button class="sys-tab" data-tab="output">Output</button>
                    <button class="sys-tab" data-tab="flow">Data Flow</button>
                    <button class="sys-tab" data-tab="status">Status</button>
                    <button class="sys-tab" data-tab="viewer">Map</button>
                    <button class="sys-tab" data-tab="log">Log</button>
                    <button class="sys-tab" data-tab="wizard">Wizard</button>
                    <button class="sys-tab" data-tab="password">Access</button>
                    <button class="sys-tab" data-tab="config">Configuration</button>
                </div>
                <div id="system-body"></div>
            </div>
        </div>

        <!-- toasts sit above the bottom bar on the left; config-manager's
             App.notify reuses this container instead of creating its own -->
        <div id="toast-container" class="fixed flex flex-col items-start" style="bottom: 5.5rem; left: 1.5rem; z-index: 70"></div>
    </div>

    <nav id="bottom-bar">
        <div id="bar-inner">
        <div id="bar-left"></div>
        <div id="nav-buttons" class="transition-opacity">
            <button id="nav-start-restart" class="hub-button" data-view="control">
                <svg id="nav-sr-icon" viewBox="0 -960 960 960" fill="currentColor">
                    <path d="M320-200v-560l440 280-440 280Zm80-280Zm0 134 210-134-210-134v268Z" />
                </svg>
                <span id="nav-sr-label">Start</span>
            </button>
            <button id="nav-btn-input" class="hub-button" data-view="input">
                <svg viewBox="0 -960 960 960" fill="currentColor">
                    <path d="M160-80q-33 0-56.5-23.5T80-160v-480q0-25 13.5-45t36.5-29l506-206 26 66-330 134h468q33 0 56.5 23.5T880-640v480q0 33-23.5 56.5T800-80H160Zm0-80h640v-280H160v280Zm160-40q42 0 71-29t29-71q0-42-29-71t-71-29q-42 0-71 29t-29 71q0 42 29 71t71 29ZM160-520h480v-80h80v80h80v-120H160v120Zm0 360v-280 280Z" />
                </svg>
                <span>Input</span>
