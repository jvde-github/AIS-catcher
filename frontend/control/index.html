<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AIS-catcher</title>
    <link rel="stylesheet" href="css/tailwind.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
            touch-action: pan-x pan-y;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        #hub-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        #webviewer-frame {
            position: absolute;
            top: 0;
            left: 0;
            border: none;
            width: 100%;
            height: 100%;
            touch-action: pan-x pan-y;
        }

        #bottom-bar {
            position: relative;
            flex-shrink: 0;
            width: 100%;
            background: #0f172a;
            border-top: 1px solid #334155;
            z-index: 50;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .hub-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 0.75rem;
            color: white;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            min-width: 70px;
        }

        .hub-button:hover {
            background: #1e293b;
        }

        .hub-button.active {
            background: #1e293b;
        }

        .hub-button svg {
            width: 1.5rem;
            height: 1.5rem;
            margin-bottom: 0.25rem;
        }

        #config-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            height: 100dvh;
            background: white;
            box-shadow: -2px 0 10px rgba(0, 0, 0, 0.1);
            transition: right 0.3s ease;
            z-index: 60;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #config-content {
            flex: 1;
            overflow-y: auto;
        }

        #config-panel.open {
            right: 0;
        }

        #config-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 55;
        }

        #config-overlay.open {
            display: block;
        }

        @media (max-width: 640px) {
            #config-panel {
                max-width: 100%;
            }
        }

        #login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #login-overlay.open {
            display: flex;
        }

        /* process log, styled like the control tool's log page */
        #log-box {
            background: #0f172a;
            padding: 0.75rem;
            height: 45vh;
            overflow: auto;
        }

        .log-line {
            display: flex;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.75rem;
            line-height: 1.5;
            padding: 1px 0;
            white-space: pre;
        }

        .log-line.error {
            color: #f87171;
        }

        .log-line.warning {
            color: #fbbf24;
        }

        .log-line.info {
            color: #60a5fa;
        }

        .log-line.debug {
            color: #94a3b8;
            opacity: 0.75;
        }

        .log-line.default {
            color: #cbd5e1;
        }

        .log-ts {
            color: #475569;
            margin-right: 0.5em;
            user-select: none;
            flex-shrink: 0;
        }

        /* bottom bar: status left, buttons centered, channel LEDs right —
           three flex zones so they can never overlap */
        #bar-inner {
            display: flex;
            align-items: center;
            height: 4rem;
            padding: 0 12px;
        }

        #status-dot-wrap {
            flex: 1 1 0;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            overflow: hidden;
        }

        #nav-buttons {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }

        #bar-right {
            flex: 1 1 0;
            display: flex;
            justify-content: flex-end;
        }

        @media (min-width: 640px) {
            #nav-buttons {
                gap: 3rem;
            }
        }

        @media (max-width: 639px) {
            .hub-button {
                min-width: 54px;
                padding: 0.5rem 0.4rem;
            }
        }

        /* per-channel activity LEDs */
        #channel-leds {
            display: none;
        }

        @media (min-width: 640px) {
            #channel-leds {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-right: 6px;
            }
        }

        .ch-led-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .ch-led {
            width: 7px;
            height: 7px;
            border-radius: 9999px;
            background: #334155;
            transition: background-color 0.5s ease-out;
        }

        .ch-led.flash {
            background: #34d399;
            transition: none;
        }

        .ch-led-label {
            font-size: 8px;
            line-height: 1;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div id="hub-container">
        <div id="loading" class="text-center p-8 absolute inset-0 flex items-center justify-center">
            <div>
                <svg class="animate-spin h-12 w-12 text-slate-600 mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-slate-600">Connecting...</p>
            </div>
        </div>
        <iframe id="webviewer-frame" src="" class="hidden" sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>

        <div id="config-overlay"></div>

        <!-- Login / first-run setup modal -->
        <div id="login-overlay">
            <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm mx-4">
                <h3 id="login-title" class="text-lg font-semibold text-slate-800 mb-1">Sign In</h3>
                <p id="login-subtitle" class="text-sm text-slate-500 mb-4">Authentication required to continue.</p>
                <div id="login-error" class="hidden mb-3 text-sm text-rose-600 bg-rose-50 border border-rose-200 rounded-lg px-3 py-2"></div>
                <form id="login-form" class="space-y-3">
                    <input id="login-password" name="password" type="password" autocomplete="current-password"
                        placeholder="Password"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
                    <input id="login-password2" name="password2" type="password" autocomplete="new-password"
                        placeholder="Confirm password"
                        class="hidden w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
                    <div class="flex gap-2 pt-1">
                        <button type="button" id="login-cancel"
                            class="flex-1 px-4 py-2 rounded-lg text-sm font-medium border border-slate-300 text-slate-600 hover:bg-slate-50 transition">
                            Cancel
                        </button>
                        <button type="submit" id="login-submit"
                            class="flex-1 px-4 py-2 rounded-lg text-sm font-semibold bg-slate-800 text-white hover:bg-slate-700 transition">
                            Sign In
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Config Panel -->
        <div id="config-panel">
            <div class="flex items-center justify-between p-4 border-b border-slate-200 bg-gradient-to-r from-slate-50 to-white">
                <h3 id="config-title" class="text-lg font-semibold text-slate-800">Configuration</h3>
                <button id="config-close" class="text-slate-600 hover:text-slate-800 p-1">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="status-message" class="hidden"></div>
            <div id="config-content" class="p-4"></div>
        </div>

        <!-- toasts sit above the bottom bar; config-manager's App.notify
             reuses this container instead of creating its own -->
        <div id="toast-container" class="fixed right-6 z-50 flex flex-col items-end" style="bottom: 5.5rem"></div>
    </div>

    <nav id="bottom-bar">
        <div id="bar-inner">
        <div id="status-dot-wrap">
            <div class="relative group">
                <span id="status-dot" class="block w-2.5 h-2.5 rounded-full bg-slate-500 cursor-default"></span>
                <div class="absolute bottom-full left-0 mb-2 min-w-max px-2.5 py-1.5 rounded-lg bg-slate-800 text-white text-xs shadow-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity duration-150 whitespace-nowrap">
                    <div id="status-dot-label" class="font-medium">Checking&#8230;</div>
                    <div id="status-dot-uptime" class="text-slate-400 text-xs mt-0.5"></div>
                    <div class="absolute top-full left-3 border-4 border-transparent border-t-slate-800"></div>
                </div>
            </div>
            <span id="status-dot-text" class="hidden sm:inline text-xs font-medium text-slate-400"></span>
        </div>
        <div id="nav-buttons" class="transition-opacity">
            <button id="nav-start-restart" class="hub-button" data-view="control">
                <svg id="nav-sr-icon" viewBox="0 -960 960 960" fill="currentColor">
                    <path d="M320-200v-560l440 280-440 280Zm80-280Zm0 134 210-134-210-134v268Z" />
                </svg>
                <span id="nav-sr-label">Start</span>
            </button>
            <button id="nav-btn-input" class="hub-button" data-view="input">
                <svg viewBox="0 -960 960 960" fill="currentColor">
                    <path d="M160-80q-33 0-56.5-23.5T80-160v-480q0-25 13.5-45t36.5-29l506-206 26 66-330 134h468q33 0 56.5 23.5T880-640v480q0 33-23.5 56.5T800-80H160Zm0-80h640v-280H160v280Zm160-40q42 0 71-29t29-71q0-42-29-71t-71-29q-42 0-71 29t-29 71q0 42 29 71t71 29ZM160-520h480v-80h80v80h80v-120H160v120Zm0 360v-280 280Z" />
                </svg>
                <span>Input</span>
            </button>
            <button id="nav-btn-output" class="hub-button" data-view="output">
                <svg viewBox="0 -960 960 960" fill="currentColor">
                    <path d="M680-80q-50 0-85-35t-35-85q0-6 3-28L282-392q-16 15-37 23.5t-45 8.5q-50 0-85-35t-35-85q0-50 35-85t85-35q24 0 45 8.5t37 23.5l281-164q-2-7-2.5-13.5T560-760q0-50 35-85t85-35q50 0 85 35t35 85q0 50-35 85t-85 35q-24 0-45-8.5T598-672L317-508q2-7 2.5-13.5t.5-14.5q0-8-.5-14.5T317-452l281 164q16-15 37-23.5t45-8.5q50 0 85 35t35 85q0 50-35 85t-85 35Zm0-80q17 0 28.5-11.5T720-200q0-17-11.5-28.5T680-240q-17 0-28.5 11.5T640-200q0 17 11.5 28.5T680-160ZM200-440q17 0 28.5-11.5T240-480q0-17-11.5-28.5T200-520q-17 0-28.5 11.5T160-480q0 17 11.5 28.5T200-440Zm480-280q17 0 28.5-11.5T720-760q0-17-11.5-28.5T680-800q-17 0-28.5 11.5T640-760q0 17 11.5 28.5T680-720Zm0 520ZM200-480Zm480-280Z" />
                </svg>
                <span>Output</span>
            </button>
            <button id="nav-btn-control" class="hub-button" data-view="control-panel">
                <svg viewBox="0 -960 960 960" fill="currentColor">
                    <path d="M686-132 444-376q-20 8-40.5 12t-43.5 4q-100 0-170-70t-70-170q0-36 10-68.5t28-61.5l146 146 72-72-146-146q29-18 61.5-28t68.5-10q100 0 170 70t70 170q0 23-4 43.5T584-516l244 242q12 12 12 29t-12 29l-84 84q-12 12-29 12t-29-12Zm29-85 27-27-256-256q18-20 26-46.5t8-53.5q0-60-38.5-104.5T386-758l74 74q12 12 12 28t-12 28L332-500q-12 12-28 12t-28-12l-74-74q9 57 53.5 95.5T360-440q26 0 52-8t47-25l256 256ZM472-488Z" />
                </svg>
                <span>Control</span>
            </button>
        </div>
        <div id="bar-right">
            <div id="channel-leds"></div>
        </div>
        </div>
    </nav>

    <script src="js/schema.js"></script>
    <script src="js/config-manager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
