<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AIS-catcher</title>
    <link rel="stylesheet" href="css/tailwind.css?hash=">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
            touch-action: pan-x pan-y;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        #hub-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        #webviewer-frame {
            position: absolute;
            top: 0;
            left: 0;
            border: none;
            width: 100%;
            height: 100%;
            touch-action: pan-x pan-y;
        }

        #bottom-bar {
            position: relative;
            flex-shrink: 0;
            width: 100%;
            background: #18181b;
            border-top: 1px solid #3f3f46;
            z-index: 50;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .hub-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 0.75rem;
            color: white;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            min-width: 70px;
        }

        .hub-button:hover {
            background: #27272a;
        }

        .hub-button.active {
            background: #27272a;
        }

        .hub-button svg {
            width: 1.5rem;
            height: 1.5rem;
            margin-bottom: 0.25rem;
        }

        /* draws the eye to Start/Restart while saved settings wait to be applied */
        .hub-button.attention {
            background: #9a3412;
        }

        .hub-button.attention:hover {
            background: #7c2d12;
        }

        #system-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 65;
            padding: 1rem;
        }

        #system-overlay.open {
            display: flex;
        }

        #system-modal {
            background: #fff;
            border-radius: 1rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
            width: 100%;
            max-width: 1000px;
            height: 85vh;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #system-header {
            display: flex;
            align-items: stretch;
            height: 52px;
            border-bottom: 1px solid #e2e8f0;
            background: #dfe5ec;
            flex-shrink: 0;
        }

        #system-title {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 14px 0 1.25rem;
            background: #f0f4f8;
            border-top-right-radius: 25% 50%;
            border-bottom-right-radius: 25% 50%;
        }

        #system-close {
            align-self: center;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 14px 0 10px;
            flex-shrink: 0;
        }

        #system-tabs {
            display: flex;
            gap: 0.375rem;
            padding: 0 1.25rem;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        #system-tabs::-webkit-scrollbar,
        .sys-subtabs::-webkit-scrollbar {
            display: none;
        }

        .tab-scroll-wrap {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #fff;
            flex-shrink: 0;
        }

        .tab-scroll-btn {
            position: absolute;
            top: 0;
            bottom: 1px;
            width: 2.75rem;
            display: none;
            align-items: center;
            color: #475569;
            cursor: pointer;
            z-index: 11;
        }

        .tab-scroll-btn.left {
            left: 0;
            justify-content: flex-start;
            padding-left: 10px;
            background: linear-gradient(to right, #fff 55%, transparent);
        }

        .tab-scroll-btn.right {
            right: 0;
            justify-content: flex-end;
            padding-right: 10px;
            background: linear-gradient(to left, #fff 55%, transparent);
        }

        .tab-scroll-wrap.can-left .tab-scroll-btn.left,
        .tab-scroll-wrap.can-right .tab-scroll-btn.right {
            display: flex;
        }

        .tab-scroll-wrap:has(.sys-subtabs) .tab-scroll-btn {
            bottom: 1px;
        }

        .sys-tab {
            padding: 0.55rem 0.95rem;
            border-bottom: 3px solid transparent;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .sys-tab:hover {
            color: #334155;
        }

        .sys-tab.active {
            color: #0857b1;
            border-bottom-color: #0857b1;
        }

        .sys-subtabs {
            display: flex;
            gap: 0.375rem;
            border-bottom: 1px solid #e2e8f0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        #system-body {
            flex: 1;
            min-height: 0;
            padding: 0.75rem 1.25rem 1.25rem;
            display: flex;
            flex-direction: column;
        }

        .sys-pane {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sys-pane.hidden {
            display: none;
        }

        .sys-pane[data-pane="log"],
        .sys-pane[data-pane="config"] {
            overflow: hidden;
        }

        @media (max-width: 640px) {
            #system-overlay {
                padding: 0;
            }
            #system-modal {
                max-width: 100%;
                height: 100vh;
                height: 100dvh;
                max-height: none;
                border-radius: 0;
            }
            .sys-tab {
                font-size: 0.75rem;
                padding: 0.5rem 0.75rem;
            }
        }

        #login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #login-overlay.open {
            display: flex;
        }

        #config-json {
            background: #0f172a;
            color: #cbd5e1;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.75rem;
            line-height: 1.5;
            padding: 0.75rem;
            flex: 1;
            min-height: 0;
            overflow: auto;
            white-space: pre;
            margin: 0;
        }

        #config-json .j-key { color: #7dd3fc; }
        #config-json .j-str { color: #fbbf24; }
        #config-json .j-num { color: #6ee7b7; }
        #config-json .j-bool, #config-json .j-null { color: #c4b5fd; }

        #log-box {
            background: #0f172a;
            padding: 0.75rem;
            flex: 1;
            min-height: 0;
            overflow: auto;
        }

        .log-line {
            display: flex;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.75rem;
            line-height: 1.5;
            padding: 1px 0;
            white-space: pre;
        }

        .log-line.error {
            color: #f87171;
        }

        .log-line.warning {
            color: #fbbf24;
        }

        .log-line.info {
            color: #60a5fa;
        }

        .log-line.debug {
            color: #94a3b8;
            opacity: 0.75;
        }

        .log-line.default {
            color: #cbd5e1;
        }

        .log-ts {
            color: #475569;
            margin-right: 0.5em;
            user-select: none;
            flex-shrink: 0;
        }

        /* bottom bar: buttons centered, status + LEDs + community grouped on
           the right. The empty left spacer shrinks first, so when space gets
           tight the buttons drift left before any indicator collapses. */
        #bar-inner {
            display: flex;
            align-items: center;
            height: 4rem;
            padding: 0 12px;
            gap: 12px;
        }

        #bar-left {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }


        #status-dot-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            overflow: hidden;
            cursor: pointer;
        }

        .bar-divider {
            display: none;
            width: 1px;
            height: 1.75rem;
            background: #3f3f46;
        }

        @media (min-width: 640px) {
            .bar-divider.div-640 {
                display: block;
            }
        }

        @media (min-width: 660px) {
            .bar-divider.div-768 {
                display: block;
            }
        }

        #nav-buttons {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }

        #bar-right {
            flex: 1 1 0;
            min-width: max-content;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        /* community map link: subordinate icon-only shortcut, first to go
           when space is tight */
        #community-link {
            display: none;
            text-decoration: none;
            color: #a1a1aa;
            transition: color 0.15s;
        }

        #community-link svg {
            width: 20px;
            height: 20px;
        }

        #community-link:hover {
            color: #d4d4d8;
        }

        @media (min-width: 660px) {
            #community-link {
                display: flex;
                align-items: center;
            }
        }

        #bar-collapse {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            background: transparent;
            border: none;
            color: #a1a1aa;
            cursor: pointer;
            transition: color 0.15s;
        }

        #bar-collapse:hover {
            color: #d4d4d8;
        }

        #bar-collapse svg {
            width: 20px;
            height: 20px;
        }

        #bar-restore,
        #login-pill {
            position: fixed;
            left: 12px;
            bottom: calc(12px + env(safe-area-inset-bottom));
            z-index: 55;
            display: none;
            align-items: center;
            gap: 8px;
            padding: 0.45rem 0.8rem;
            background: #18181b;
            border: 1px solid #3f3f46;
            border-radius: 9999px;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.28);
            transition: background-color 0.2s;
        }

        #bar-restore:hover,
        #login-pill:hover {
            background: #27272a;
        }

        #bar-restore.show,
        #login-pill.show {
            display: flex;
        }

        #bar-restore svg,
        #login-pill svg {
            width: 16px;
            height: 16px;
            color: #a1a1aa;
        }

        #restore-dot {
            display: block;
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 9999px;
            background: #64748b;
        }

        @media (min-width: 640px) {
            #nav-buttons {
                gap: 3rem;
            }
        }

        @media (max-width: 639px) {
            .hub-button {
                min-width: 54px;
                padding: 0.5rem 0.4rem;
            }
        }

        #channel-leds {
            display: none;
        }

        @media (min-width: 640px) {
            #channel-leds {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-right: 6px;
            }
        }

        .ch-led-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .ch-led {
            width: 7px;
            height: 7px;
            border-radius: 9999px;
            background: #3f3f46;
            transition: background-color 0.5s ease-out;
        }

        .ch-led.flash {
            background: #34d399;
            transition: none;
        }

        .ch-led-label {
            font-size: 8px;
            line-height: 1;
            color: #a1a1aa;
        }

        #wizard-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 90;
            padding: 1rem;
        }

        #wizard-overlay.open {
            display: flex;
        }

        #wizard-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            max-height: calc(100vh - 2rem);
            max-height: calc(100dvh - 2rem);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .wz-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1rem 0 1.5rem;
        }

        .wz-x {
            border: none;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 0.5rem;
        }

        .wz-x:hover {
            color: #1e293b;
            background: #f1f5f9;
        }

        .wz-dots {
            display: flex;
            gap: 6px;
        }

        .wz-dot {
            width: 8px;
            height: 8px;
            border-radius: 9999px;
            background: #e2e8f0;
        }

        .wz-dot.active {
            background: #0857b1;
        }

        .wz-dot.past {
            background: #93c5fd;
        }

        .wz-body {
            padding: 0.75rem 1.5rem 0.5rem;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }

        .wz-body h2 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0.75rem 0 0.15rem;
        }

        .wz-body h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f172a;
            margin: 0 0 0.5rem;
        }

        .wz-body p {
            font-size: 0.875rem;
            color: #475569;
            line-height: 1.55;
            margin: 0.5rem 0;
        }

        .wz-welcome {
            text-align: center;
            padding-bottom: 0.25rem;
        }

        .wz-welcome p {
            text-align: left;
        }

        .wz-welcome .wz-sub {
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0;
        }

        .wz-logo {
            display: inline-block;
            width: 64px;
            height: 64px;
            color: #0857b1;
        }

        .wz-logo svg {
            width: 100%;
            height: 100%;
        }

        .wz-fineprint {
            font-size: 0.72rem !important;
            color: #94a3b8 !important;
        }

        .wz-fineprint a {
            color: #64748b;
            text-decoration: underline;
        }

        .wz-intro {
            margin-top: 0;
        }

        .wz-options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .wz-option {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }

        .wz-option:hover {
            border-color: #cbd5e1;
            background: #f8fafc;
        }

        .wz-option.selected {
            border-color: #0857b1;
            background: #eff6ff;
        }

        .wz-option input[type="radio"],
        .wz-option input[type="checkbox"] {
            margin-top: 0.2rem;
            accent-color: #0857b1;
        }

        .wz-option-icon {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            color: #64748b;
        }

        .wz-option.selected .wz-option-icon {
            color: #0857b1;
        }

        .wz-option-icon svg {
            width: 100%;
            height: 100%;
        }

        .wz-mini-link {
            color: #0857b1;
            text-decoration: underline;
        }

        .wz-option-main {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }

        .wz-option-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #0f172a;
        }

        .wz-option-sub {
            font-size: 0.75rem;
            color: #64748b;
        }

        .wz-daisy {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .wz-daisy.hidden {
            display: none;
        }

        .wz-daisy input,
        .wz-daisy select,
        .wz-input {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            color: #0f172a;
            background: white;
            box-sizing: border-box;
        }

        .wz-daisy input:focus,
        .wz-input:focus {
            outline: 2px solid #93c5fd;
            border-color: #0857b1;
        }

        .wz-none {
            font-size: 0.8rem !important;
            color: #94a3b8 !important;
        }

        .wz-loading {
            font-size: 0.85rem;
            color: #64748b;
            padding: 0.75rem 0;
        }

        .wz-service {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin: 0.5rem 0 0.75rem;
        }

        .wz-service-icon {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            color: #0857b1;
        }

        .wz-service-icon svg,
        .wz-service-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .wz-field-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #334155;
            margin: 0.9rem 0 0.3rem;
        }

        .wz-summary {
            margin: 0.5rem 0 1rem;
            padding-left: 1.25rem;
            font-size: 0.875rem;
            color: #334155;
            line-height: 1.9;
        }

        .wz-check {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: #334155;
            margin: 0.5rem 0;
        }

        .wz-check input {
            accent-color: #0857b1;
        }

        .wz-error {
            margin: 0 1.5rem;
            font-size: 0.8rem;
            color: #e11d48;
            background: #fff1f2;
            border: 1px solid #fecdd3;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
        }

        .wz-error.hidden {
            display: none;
        }

        .wz-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem 1.25rem;
        }

        .wz-foot-right {
            display: flex;
            gap: 0.5rem;
        }

        .wz-btn {
            border-radius: 0.5rem;
            padding: 0.5rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.15s;
        }

        .wz-btn.primary {
            background: #fff;
            color: #334155;
            border: 1px solid #cbd5e1;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .wz-btn.primary:hover {
            background: #f8fafc;
        }

        .wz-btn.primary:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .wz-btn.ghost {
            background: transparent;
            color: #64748b;
            border: 1px solid #cbd5e1;
        }

        .wz-btn.ghost:hover {
            background: #f8fafc;
        }

        .wz-btn.link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #fff;
            color: #334155;
            border: 1px solid #cbd5e1;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            text-decoration: none;
            margin: 0.25rem 0;
        }

        .wz-btn.link:hover {
            background: #f8fafc;
        }

        .wz-btn.link svg {
            width: 14px;
            height: 14px;
        }
    </style>
</head>
<body>
    <div id="hub-container">
        <div id="loading" class="text-center p-8 absolute inset-0 flex items-center justify-center">
            <div>
                <svg class="animate-spin h-12 w-12 text-slate-600 mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-slate-600">Connecting...</p>
            </div>
        </div>
        <iframe id="webviewer-frame" src="" class="hidden" allow="fullscreen" allowfullscreen
            sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>

        <div id="login-overlay">
            <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm mx-4">
                <h3 id="login-title" class="text-lg font-semibold text-slate-800 mb-1">Sign In</h3>
                <p id="login-subtitle" class="text-sm text-slate-500 mb-4">Authentication required to continue.</p>
                <div id="login-error" class="hidden mb-3 text-sm text-rose-600 bg-rose-50 border border-rose-200 rounded-lg px-3 py-2"></div>
                <form id="login-form" class="space-y-3">
                    <input id="login-password" name="password" type="password" autocomplete="current-password"
                        placeholder="Password"
