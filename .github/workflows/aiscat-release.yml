name: aiscat — release wheels

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which index to publish to"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]
  push:
    tags: ["aiscat-v*.*.*"]

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }} ${{ matrix.archs }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    archs: x86_64 }
          - { os: ubuntu-latest,    archs: armv7l,  qemu: arm }
          - { os: ubuntu-24.04-arm, archs: aarch64 }
          - { os: macos-14,         archs: auto }
          - { os: windows-latest,   archs: AMD64 }
          - { os: windows-11-arm,   archs: ARM64 }
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.qemu }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS: ${{ matrix.archs }}
        with:
          package-dir: python

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.archs }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install build

      - name: Vendor upstream Source/ into python/
        working-directory: python
        run: python scripts/prepare_sdist.py

      - name: Build sdist
        working-directory: python
        run: python -m build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: python/dist/*.tar.gz

  upload:
    name: Upload to ${{ inputs.target || 'pypi' }}
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.target || 'pypi' }}
      url: ${{ inputs.target == 'testpypi' && 'https://test.pypi.org/p/aiscat' || 'https://pypi.org/p/aiscat' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        if: inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

      - name: Publish to PyPI
        if: github.event_name == 'push' || inputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
